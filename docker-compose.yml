version: "3.9"

services:
  trading-bot:
    build: .
    container_name: trading-agents
    restart: unless-stopped
    env_file: .env
    environment:
      - HEADLESS=true
      - BROKER_TYPE=${BROKER_TYPE:-paper}
      - TRADING_DATA_DIR=/app/data
      - TRADING_CAPITAL=${TRADING_CAPITAL:-10000}
      - TRADING_INTERVAL_MINUTES=${TRADING_INTERVAL_MINUTES:-60}
      - WATCHED_SYMBOLS=${WATCHED_SYMBOLS:-BTC/USD,ETH/USD,SOL/USD}
      - PORT=${PORT:-8000}
      - MT5_LOGIN=${MT5_LOGIN:-0}
      - MT5_PASSWORD=${MT5_PASSWORD:-}
      - MT5_SERVER=${MT5_SERVER:-MetaQuotes-Demo}
      - DXTRADE_API_URL=${DXTRADE_API_URL:-}
      - DXTRADE_USERNAME=${DXTRADE_USERNAME:-}
      - DXTRADE_PASSWORD=${DXTRADE_PASSWORD:-}
      - DXTRADE_DOMAIN=${DXTRADE_DOMAIN:-default}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      - trading_data:/app/data

volumes:
  trading_data:
