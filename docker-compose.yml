version: "3.9"

services:
  trading-bot:
    build: .
    container_name: trading-agent-firm
    ports:
      - "8000:8000"
    volumes:
      - trading_data:/app/data
    environment:
      - HEADLESS=true
      - PORT=8000
      - BROKER_TYPE=paper
      - TRADING_DATA_DIR=/app/data
      - TRADING_INTERVAL_MINUTES=60
      - WATCHED_SYMBOLS=BTC/USD,ETH/USD,SOL/USD,BNB/USD,XRP/USD
      - INITIAL_BALANCE=20000
      - BINANCE_USE_TESTNET=true
      # Override these via .env or Railway dashboard:
      # - BINANCE_API_KEY=
      # - BINANCE_API_SECRET=
      # - TELEGRAM_BOT_TOKEN=
      # - TELEGRAM_CHAT_ID=
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  trading_data:
