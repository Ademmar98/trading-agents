version: "3.9"

services:
  trading-bot:
    build: .
    container_name: trading-agents
    restart: unless-stopped
    env_file: .env
    environment:
      - HEADLESS=true
      - BROKER_TYPE=${BROKER_TYPE:-paper}
      - TRADING_CAPITAL=${TRADING_CAPITAL:-10000}
      - TRADING_INTERVAL_MINUTES=${TRADING_INTERVAL_MINUTES:-60}
      - WATCHED_SYMBOLS=${WATCHED_SYMBOLS:-BTC/USD,ETH/USD,SOL/USD}
      - PORT=${PORT:-8000}
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      - trading_data:/app/data

volumes:
  trading_data:
